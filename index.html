<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taiwan Driving Test Practice</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #f5f5f5;
        padding: 0;
        margin: 0;
        display: flex;
        height: 100vh;
        overflow: hidden;
      }
      .main-content {
        flex: 1;
        overflow-y: auto;
        height: 100vh;
        padding: 20px;
        padding-bottom: 0;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
      }
      .header {
        background: white;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 20px;
      }
      h1 {
        color: #333;
        margin-bottom: 10px;
      }
      .filters {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 15px;
      }
      .filter-btn {
        padding: 8px 16px;
        border: 2px solid #ddd;
        background: white;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .filter-btn.active {
        background: #007bff;
        color: white;
        border-color: #007bff;
      }
      .stats {
        display: flex;
        gap: 20px;
        margin-top: 15px;
        color: #666;
        font-size: 14px;
      }
      .question-card {
        background: white;
        padding: 30px;
        border-radius: 8px;
        margin-bottom: 20px;
      }
      .question-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        flex-wrap: wrap;
        gap: 10px;
      }
      .question-header > div {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .question-number {
        font-size: 14px;
        color: #666;
      }
      .question-type {
        padding: 4px 12px;
        background: #e3f2fd;
        color: #1976d2;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 500;
      }
      .question-text {
        font-size: 18px;
        line-height: 1.6;
        margin-bottom: 20px;
        color: #333;
      }
      .options {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .option {
        padding: 15px;
        border: 2px solid #ddd;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 16px;
      }
      .option.true-false-opt {
        font-size: 32px;
        text-align: center;
        padding: 20px;
      }
      .option:hover {
        border-color: #007bff;
        background: #f8f9fa;
      }
      .option.selected {
        border-color: #007bff;
        background: #e3f2fd;
      }
      .option.correct {
        border-color: #28a745;
        background: #d4edda;
      }
      .option.incorrect {
        border-color: #dc3545;
        background: #f8d7da;
      }
      .feedback {
        margin-top: 20px;
        padding: 15px;
        border-radius: 6px;
        font-weight: 500;
      }
      .feedback.correct {
        background: #d4edda;
        color: #155724;
      }
      .feedback.incorrect {
        background: #f8d7da;
        color: #721c24;
      }
      .controls {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }
      .btn {
        padding: 12px 24px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
        font-weight: 500;
        transition: all 0.2s;
      }
      .btn-primary {
        background: #007bff;
        color: white;
      }
      .btn-primary:hover {
        background: #0056b3;
      }
      .btn-secondary {
        background: #6c757d;
        color: white;
      }
      .btn-secondary:hover {
        background: #545b62;
      }
      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #666;
      }
      .question-image {
        text-align: center;
        margin-bottom: 20px;
      }
      .question-image img {
        max-width: 100%;
        height: auto;
        border-radius: 8px;
      }
      .index-panel {
        width: 300px;
        height: 100vh;
        background: white;
        overflow-y: auto;
        overflow-x: hidden;
        flex-shrink: 0;
        border-left: 1px solid #eee;
      }
      .index-content {
        padding: 10px;
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 6px;
      }
      .index-toggle {
        display: none;
      }
      .filter-select {
        display: none;
      }
      @media (max-width: 768px) {
        body {
          flex-direction: column;
          height: 100vh;
          overflow: auto;
        }
        .main-content {
          overflow-y: visible;
          height: 100vh;
        }
        .header {
          padding: 10px 12px;
          margin-bottom: 12px;
        }
        h1 {
          font-size: 16px;
          margin-bottom: 4px;
        }
        .header > p {
          display: none;
        }
        .stats {
          margin-top: 8px;
        }
        .filters {
          display: none;
        }
        .filter-select {
          display: block;
          width: 100%;
          margin-top: 10px;
          padding: 8px 10px;
          border: 2px solid #ddd;
          border-radius: 6px;
          font-size: 14px;
          background: white;
          cursor: pointer;
        }
        .question-card {
          padding: 16px;
        }
        .question-text {
          font-size: 16px;
        }
        .filter-btn {
          padding: 6px 12px;
          font-size: 14px;
        }
        .btn {
          padding: 10px 18px;
          font-size: 14px;
        }
        .index-panel {
          width: 100%;
          height: auto;
          max-height: 0;
          overflow: hidden;
          border-left: none;
          border-top: 1px solid #eee;
          transition: max-height 0.3s ease;
          position: sticky;
          bottom: 0;
          z-index: 10;
        }
        .index-panel.open {
          max-height: 40vh;
          overflow-y: auto;
        }
        .index-content {
          grid-template-columns: repeat(7, 1fr);
          gap: 6px;
          padding: 10px 10px 60px;
        }
        .index-item {
          padding: 8px 4px;
          font-size: 12px;
        }
        .index-toggle {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 8px;
          width: 100%;
          padding: 12px;
          background: white;
          border: none;
          border-top: 1px solid #eee;
          font-size: 14px;
          font-weight: 500;
          color: #333;
          cursor: pointer;
          position: sticky;
          bottom: 0;
          z-index: 11;
        }
      }
      .index-item {
        padding: 12px 8px;
        border: 2px solid #ddd;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        font-size: 14px;
        text-align: center;
      }
      .index-item:hover {
        border-color: #007bff;
        background: #f8f9fa;
      }
      .index-item.active {
        border-color: #007bff;
        background: #e3f2fd;
      }
      .index-item.favorite {
        background: #fff8e1;
        border-color: #ffc107;
      }
      .favorite-btn {
        background: none;
        border: none;
        font-size: 24px;
        cursor: pointer;
        color: #ddd;
        transition: all 0.2s;
        padding: 0;
        margin-left: 10px;
      }
      .favorite-btn.favorited {
        color: #ffc107;
      }
      .favorite-btn:hover {
        transform: scale(1.2);
      }
      .index-item.favorite {
        border-color: #ffc107;
        background: #fff8e1;
      }
      .index-item-number {
        font-weight: 600;
        color: #333;
      }
      .lang-selector {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .lang-btn {
        padding: 6px 14px;
        border: 2px solid #ddd;
        background: white;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        transition: all 0.2s;
      }
      .lang-btn.active {
        background: #28a745;
        color: white;
        border-color: #28a745;
      }
      .loading-state {
        text-align: center;
        padding: 60px 20px;
        color: #666;
      }
      .pdf-links {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 8px;
        font-size: 12px;
      }
      .pdf-links-label {
        color: #888;
      }
      .pdf-link {
        padding: 3px 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        color: #555;
        text-decoration: none;
        background: #fafafa;
        transition: all 0.15s;
      }
      .pdf-link:hover {
        border-color: #007bff;
        color: #007bff;
        background: #f0f7ff;
      }
    </style>
  </head>
  <body>
    <div class="main-content">
      <div class="container">
        <div class="header">
          <h1>🚗 Taiwan Driving Test Practice</h1>
          <p>Practice with real test questions</p>
          <div id="lang-selector" class="lang-selector"></div>
          <div id="filters" class="filters"></div>
          <select class="filter-select" id="filter-select"></select>
          <div class="stats">
            <span>Total: <strong id="total-count">0</strong></span>
          </div>
        </div>
        <div id="question-container"></div>
      </div>
    </div>

    <div class="index-panel" id="index-panel">
      <div class="index-content" id="index-content">
        <!-- Index items will be populated here -->
      </div>
    </div>
    <button class="index-toggle" id="index-toggle">☰ Question Index</button>

    <script type="module" src="/app.js"></script>
  </body>
</html>
